name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set short SHA
      id: vars
      run: echo "SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build the Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:$SHA_SHORT ./backend

    - name: Push backend image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:$SHA_SHORT

    - name: Build frontend image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:$SHA_SHORT ./frontend

    - name: Push frontend image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:$SHA_SHORT
